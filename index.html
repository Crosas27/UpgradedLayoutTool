<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel Layout Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <h1>Panel Layout Tool</h1>

  <form id="layoutForm">

    <div class="card">
      <h3>Wall Settings</h3>
      
      <label>Wall Length (inches)</label>
      <input id="wallLength" type="number" value="480" placeholder="e.g. 480" />

      <label>Panel Coverage (inches)</label>
      <input id="panelCoverage" type="number" value="36" />

      <label>Rib Spacing (inches)</label>
      <input id="ribSpacing" type="number" value="12" />

      <label>Start Offset (inches)</label>
      <input id="startOffset" type="number" value="0" />

      <button type="button" id="generateBtn">Refresh Layout</button>
    </div>

    <div class="card">
      <h3>Openings</h3>
      <div id="openingsList"></div>

      <div class="opening-form">
        <input id="openingStart" type="number" placeholder="Start (in)" />
        <input id="openingWidth" type="number" placeholder="Width (in)" />
      </div>
      <button type="button" id="addOpeningBtn">Add Opening</button>
    </div>

  </form>

  <div class="card">
    <div class="preview-header">
      <h3>Live Preview</h3>
      <button id="exportBtn">Export SVG</button>
    </div>
    <svg id="wallSvg"></svg>
  </div>

  <div class="report-card" id="panelSummary"></div>
  <div class="report-card" id="openingReport"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
